<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <!-- Дуже важливі для повноекранного режиму -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Для standalone / fullscreen режиму -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="theme-color" content="#e3e2d5" />

    <link rel="manifest" href="./manifest.json" />

    <link rel="stylesheet" href="css/task-5.css" />
  </head>

  <body>
    <div class="refresh-window">
      <a
        href="pages/page-alert-5.html"
        style="position: fixed; top: 12px; right: 22px; z-index: 1000"
      >
        <img src="photo/button-bell.png" alt="Сповіщення" />
      </a>
    </div>

    <div class="marquee-viewport">
      <p id="running-line">
        Документ оновлено о 21:53 | 24.02.2026 • Документ оновлено о 22:53 |
        24.02.2026 •
      </p>
    </div>

    <div
      class="plus-window"
      id="open-modal-btn"
      style="
        position: fixed;
        bottom: 170px;
        right: 41px;
        z-index: 1000;
        cursor: pointer;
      "
    >
      <!-- <img src="photo/plus.png" alt="Plus" /> -->
      <div class="plus-button" id="open-modal-btn">
        <span class="plus-icon">+</span>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
      <div id="modal-sheet" class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-menu">
          <a href="pages/page-plus-5.html" class="modal-item">
            <img src="photo/info.png" alt="" class="modal-icon" />
            <span>Переглянути документ</span>
          </a>

          <a href="" class="modal-item">
            <img src="photo/pdf.png" alt="" class="modal-icon" />
            <span>Завантажити PDF</span>
          </a>

          <!-- <div class="modal-item" id="update-doc-btn"> -->
          <a href="pages/update-screen.html" class="modal-item">
            <img src="photo/refresh.png" alt="" class="modal-icon" />
            <span>Оновити документ</span>
          </a>
          <!-- </div> -->
        </div>
      </div>
    </div>

    <button
      id="installBtn"
      style="
        display: none;
        position: fixed;
        bottom: 360px;
        left: 130px;
        z-index: 9999;
        padding: 12px;
        background: #ff000d;
        border: none;
        border-radius: 8px;
      "
    >
      Встановити додаток
    </button>

    <script src="./js/install.js"></script>

    <script src="./js/task-5.js" type="module"></script>
  </body>
</html>

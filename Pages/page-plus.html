<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#e3e2d5" />
    <link rel="stylesheet" href="../../../GitHub/js-practice/css/task-6.css" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden; /* Повністю блокуємо системний скрол браузера */
        background-color: #e3e2d5;
        touch-action: none; /* Забороняємо тягнути сторінку вниз (Refresh pull) */
      }

      #scroll-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        will-change: transform;
        /* Важливо для плавності */
        transition: transform 0.1s ease-out;
      }

      .bg-image {
        display: block;
        width: 100%;
        height: auto; /* Картинка зберігає пропорції */
      }

      .refresh-window {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px; /* Висота зони навігації */
        z-index: 1000;
        pointer-events: none; /* Щоб кліки проходили крізь контейнер */
      }

      .back-btn {
        pointer-events: auto; /* Повертаємо клікабельність тільки кнопці */
        display: block;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="refresh-window">
      <!-- Змінив посилання на index.html, щоб повертало назад -->
      <a href="../../../GitHub/js-practice/task-6.html" class="back-btn">
        <img
          src="../../../GitHub/js-practice/Photo/swipe.png"
          alt="Назад"
          style="width: 100%; position: absolute; top: 36px; left: 0px"
        />
      </a>
    </div>

    <div id="scroll-container">
      <img
        src="../../../GitHub/js-practice/Photo/plus-window.png"
        class="bg-image"
        alt="Background"
      />
    </div>

    <div class="marquee-viewport">
      <p id="running-line">
        Документ оновлено о 21:53 | 24.02.2026 • Документ оновлено о 22:53 |
        24.02.2026 •
      </p>
    </div>
    <script>
      const container = document.getElementById("scroll-container");
      let startY = 0;
      let translateY = 0;
      let lastTranslateY = 0;

      document.addEventListener(
        "touchstart",
        (e) => {
          startY = e.touches[0].pageY;
          container.style.transition = "none"; // Вимикаємо анімацію під час руху пальцем
        },
        { passive: false },
      );

      document.addEventListener(
        "touchmove",
        (e) => {
          const touchY = e.touches[0].pageY;
          const diff = touchY - startY;
          let targetY = lastTranslateY + diff;

          // Обмеження, щоб не вилітало за межі
          const minY = window.innerHeight - container.offsetHeight;

          if (targetY > 0) targetY = 0; // Не даємо тягнути вниз більше верху
          if (targetY < minY) targetY = minY; // Не даємо тягнути вище низу

          container.style.transform = `translateY(${targetY}px)`;
          translateY = targetY;

          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener("touchend", () => {
        lastTranslateY = translateY;
        container.style.transition =
          "transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)";
      });
    </script>
  </body>
</html>

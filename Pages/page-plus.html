<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#e3e2d5" />
    <link rel="stylesheet" href="../css/task-7.css" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #e3e2d5;
        touch-action: none;
      }

      #scroll-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        /* Початковий стан — вгорі */
        transform: translateY(0);
        will-change: transform;
        transition: transform 0.1s ease-out;
      }

      .bg-image {
        display: block;
        width: 100%;
        height: auto;
        z-index: 1;
      }

      .marquee-viewport {
        background-color: #704d1b;
        overflow: hidden;
        white-space: nowrap;
        position: absolute;
        /* Встановлюємо стрічку на місце коричневої смуги (приблизно 191px) */
        top: -280px;
        left: 0px;
        margin-left: 0;
        width: calc(100%);
        height: 24px;
        display: flex;
        align-items: center;
        z-index: 1000;
      }

      #running-line {
        display: inline-block;
        color: #ffffff;
        font-family: "e-Ukraine", sans-serif;
        font-size: 11px;
        /* padding-left: 100%; */
        animation: marquee 10s linear infinite;
      }

      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      .refresh-window {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;
        z-index: 2000;
      }

      .back-btn {
        pointer-events: auto;
        display: block;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="refresh-window">
      <a href="task-7.html" class="back-btn">
        <img
          src="../photo/swipe.png"
          alt="Назад"
          style="width: 100%; position: absolute; top: 36px; left: 0px"
        />
      </a>
    </div>

    <div id="scroll-container">
      <div class="marquee-viewport">
        <span id="running-line">
          Документ оновлено о 15:01 | 17.04.2026 • Документ оновлено о 15:01 |
          17.04.2026 •
        </span>
      </div>
      <img src="../photo/plus-window.png" class="bg-image" alt="Background" />
    </div>

    <script>
      const container = document.getElementById("scroll-container");
      let startY = 0;
      let translateY = 0;
      let lastTranslateY = 0;
      let minY = 0;
      const swipeThreshold = 100; // Дистанція в пікселях для активації переходу

      function updateMinY() {
        minY = window.innerHeight - container.offsetHeight;
      }

      window.onload = () => {
        updateMinY();
        container.style.transform = `translateY(0px)`;
      };

      document.addEventListener(
        "touchstart",
        (e) => {
          startY = e.touches[0].pageY;
          container.style.transition = "none";
          updateMinY();
        },
        { passive: false },
      );

      document.addEventListener(
        "touchmove",
        (e) => {
          const touchY = e.touches[0].pageY;
          const diff = touchY - startY;
          let targetY = lastTranslateY + diff;

          // Логіка змахування вниз для виходу:
          // Якщо ми вгорі і тягнемо вниз, дозволяємо "гумовий" ефект
          if (targetY > 0) {
            // Опір, щоб було зрозуміло, що це рух для виходу
            targetY = diff * 0.2;
          } else if (targetY < minY) {
            targetY = minY; // Обмежуємо знизу
          }

          container.style.transform = `translateY(${targetY}px)`;
          translateY = targetY;
          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener("touchend", () => {
        // Перевірка: якщо ми потягнули вниз більше ніж на поріг (swipeThreshold)
        if (translateY > swipeThreshold) {
          // Анімація вильоту вниз перед переходом
          container.style.transition = "transform 0.4s ease-in";
          container.style.transform = `translateY(${window.innerHeight}px)`;

          setTimeout(() => {
            window.location.href = "task-7.html";
          }, 0);
          return;
        }

        // Якщо змах був недостатній, повертаємо в початкове положення (або зберігаємо скрол)
        lastTranslateY = translateY > 0 ? 0 : translateY;
        container.style.transition =
          "transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1)";
        container.style.transform = `translateY(${lastTranslateY}px)`;
      });
    </script>
  </body>
</html>

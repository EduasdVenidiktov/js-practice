<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <!-- Дуже важливі для повноекранного режиму -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Для standalone / fullscreen режиму -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta name="theme-color" content="#e3e2d5" />

    <link rel="manifest" href="../manifest.json" />

    <link rel="stylesheet" href="../css/task-7.css" />
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-image: url(../photo/refresh-window.jpg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
    "
  >
    <style>
      .refresh-window {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 80px;
        z-index: 2000;
        pointer-events: none; /* Щоб не заважало свайпам */
      }

      .back-btn-circle {
        display: flex;
        align-items: center;
        justify-content: center;

        position: absolute;
        top: 14px; /* Коригування по вертикалі */
        left: 18px;

        width: 44px; /* Розмір кола */
        height: 44px;
        border-radius: 50%;

        /* Колір з вашого скриншоту */
        background-color: #f2f2eb;

        text-decoration: none;
        pointer-events: auto; /* Вмикаємо клікабельність назад */
        transition: background-color 0.2s ease;
      }

      .back-btn-circle:active {
        background-color: #e6e6df; /* Ефект при натисканні */
      }

      .back-icon-img {
        width: 24px; /* Розмір самої стрілки всередині кола */
        height: 24px;
        display: block;
      }
    </style>

    <div class="refresh-window">
      <a href="../task-7.html" class="back-btn-circle">
        <img src="../photo/back-icon.png" alt="Назад" class="back-icon-img" />
      </a>
    </div>
    <!-- <div class="refresh-window">
      <a href="../task-7.html">
        <img
          src="../photo/back-icon.png"
          alt="Назад"
          style="
            width: 32px;
            height: 32px;
            position: absolute;
            top: 8px;
            left: 18px;
          "
        />
      </a>
    </div> -->

    <script src="../js/task-7.js" type="module"></script>
  </body>
</html>

<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />

    <!-- Дуже важливі для повноекранного режиму -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- Для standalone / fullscreen режиму -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- або "black-translucent" -->

    <meta name="theme-color" content="#e3e2d5" />
    <!-- <meta name="theme-color" content="#fff" /> -->

    <link rel="manifest" href="./maniftst-5.json" />

    <link rel="stylesheet" href="css/task-5.css" />
  </head>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("/js-practice/sw.js")
        .then(() => console.log("SW registered"));
    }
  </script>
  <body>
    <div class="marquee-viewport">
      <p id="running-line">
        Документ оновлено о 21:53 | 24.02.2026 • Документ оновлено о 22:53 |
        24.02.2026 •
      </p>
    </div>

    <script src="./js/task-5.js" type="module"></script>
  </body>
</html>
